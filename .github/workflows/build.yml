name: Build & Release (Android)

on:
  push:
    branches: [main]
  workflow_dispatch:

# release job 需要寫入 Releases 的權限
permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.35.3"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release:
    name: Publish to Releases
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage release assets
        run: |
          mkdir -p assets
          cp dist/android-apk/app-release.apk assets/taiwan-transit.apk
          ls -lh assets

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新建置 (latest)
          prerelease: true
          # 讓 latest tag 隨每次 build 指向最新 commit
          target_commitish: ${{ github.sha }}
          body: |
            自動建置產物（commit ${{ github.sha }}）
            - `taiwan-transit.apk`：Android（release，debug key 簽署，可側載）
          files: assets/*
